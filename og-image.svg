<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="362" cy="453" r="36" fill="#0a1628" opacity="0.12"/>
    <circle cx="608" cy="462" r="77" fill="#0a1628" opacity="0.06"/>
    <circle cx="854" cy="91" r="42" fill="#0a1628" opacity="0.11"/>
    <circle cx="143" cy="135" r="71" fill="#0a1628" opacity="0.19"/>
    <circle cx="222" cy="719" r="20" fill="#0a1628" opacity="0.06"/>
    <circle cx="441" cy="-63" r="74" fill="#0a1628" opacity="0.19"/>
    <rect x="696" y="96" width="54" height="53" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(15, 885, -15)"/>
    <rect x="-20" y="50" width="99" height="20" rx="8" fill="#0d2137" opacity="0.12" transform="rotate(31, 268, 478)"/>
    <rect x="56" y="584" width="77" height="79" rx="8" fill="#0d2137" opacity="0.12" transform="rotate(13, 1233, 282)"/>
    <rect x="97" y="580" width="63" height="48" rx="8" fill="#0d2137" opacity="0.15" transform="rotate(36, -30, 141)"/>
    <rect x="630" y="124" width="49" height="85" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(37, 420, 108)"/>
    <rect x="-15" y="469" width="71" height="24" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(20, 1068, 451)"/>
    <rect x="393" y="-29" width="99" height="97" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(0, 166, 480)"/>
    <rect x="818" y="497" width="54" height="88" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(0, 165, 7)"/>
    <polygon points="612,400 632,440 592,440" fill="#0a1628" opacity="0.11"/>
    <polygon points="794,108 829,178 759,178" fill="#0a1628" opacity="0.12"/>
    <polygon points="685,-176 766,-14 604,-14" fill="#0a1628" opacity="0.11"/>
    <polygon points="829,264 926,458 732,458" fill="#0a1628" opacity="0.08"/>

  <!-- Wave at bottom -->
  <path d="M0,560 C360,595 840,525 1200,560 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    공항 클럽 비교
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    공항 — 클럽
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    공항 공항 클럽 비교 — 클럽
  </text>
</svg>